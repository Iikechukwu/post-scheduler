# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────
# All four values are required for OAuth 1.0a (tweet posting).
# Find them in: developer.twitter.com → Your App → Keys and Tokens
#
# ⚠️  Never commit this file to GitHub. Add it to .gitignore.
# ─────────────────────────────────────────────────────────────

TWITTER_API_KEY             = "paste-your-api-key-here"
TWITTER_API_KEY_SECRET      = "paste-your-api-key-secret-here"
TWITTER_ACCESS_TOKEN        = "paste-your-access-token-here"
TWITTER_ACCESS_TOKEN_SECRET = "paste-your-access-token-secret-here"
